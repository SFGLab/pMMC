; ============================================================================
; pMMC-benchmark — Automated benchmarking and script generation
; ============================================================================
;
; Usage:  pMMC-benchmark -s benchmark.ini
;
; Runs an internal generate-reconstruct-compare cycle for loop counts
; {10, 100, 1000}, reporting distance correlation, RMSD, and wall-clock
; time for each.  Then generates redistributable bash scripts for
; cross-tool comparisons (pMMC vs. cudaMMC vs. 3D-GNOME).
;
; Output:
;   benchmark_results.csv          — internal benchmark results
;   benchmark_results.svg / .png   — results chart
;   run_benchmark.sh               — 3-tool comparison script
;   run_speed_benchmark.sh         — per-chromosome wall-clock timing
;   run_scalability.sh             — performance vs loop count
;   run_ensemble_benchmark.sh      — intra-ensemble similarity
;   run_quality_comparison.sh      — Pearson/Spearman quality metrics
;   run_resource_monitor.sh        — GPU/CPU/memory utilization capture
;
; ============================================================================

[main]
output_dir = ./benchmark/
chromosomes = chr22             ; Chromosome for synthetic data generation
label = bench                   ; Label prefix
ensemble_size = 20              ; Ensemble size for synthetic data
seed = 42                       ; Random seed (0 = time-based)
output_level = 2

; --- Reconstruction parameters used during the benchmark ---
random_walk = no
loop_density = 5
steps_lvl1 = 2
steps_lvl2 = 2
steps_arcs = 3
steps_smooth = 3
noise_lvl1 = 0.5
noise_lvl2 = 0.5
noise_arcs = 0.01
noise_smooth = 5.0
max_pet_length = 1000000
long_pet_power = 2.0
long_pet_scale = 1.0

[cuda]
num_threads = 512
blocks_multiplier = 4
milestone_fails = 3

[distance]
genomic_dist_power = 0.75
genomic_dist_scale = 0.5
genomic_dist_base = 1.0
freq_dist_scale = 25.0
freq_dist_power = -0.6
freq_dist_scale_inter = 120.0
freq_dist_power_inter = -1.0
count_dist_a = 0.2
count_dist_scale = 1.8
count_dist_shift = 8
count_dist_base_level = 0.2

[springs]
stretch_constant = 0.1
squeeze_constant = 0.1
angular_constant = 0.1
stretch_constant_arcs = 1.0
squeeze_constant_arcs = 1.0

[simulation_heatmap]
max_temp_heatmap = 5.0
delta_temp_heatmap = 0.9999
jump_temp_scale_heatmap = 50.0
jump_temp_coef_heatmap = 20.0
stop_condition_improvement_threshold_heatmap = 0.99
stop_condition_successes_threshold_heatmap = 10
stop_condition_steps_heatmap = 50000

[simulation_arcs]
max_temp = 5.0
delta_temp = 0.9999
jump_temp_scale = 50.0
jump_temp_coef = 20.0
stop_condition_improvement_threshold = 0.975
stop_condition_successes_threshold = 100
stop_condition_steps = 50000

[simulation_arcs_smooth]
dist_weight = 1.0
angle_weight = 1.0
max_temp = 5.0
delta_temp = 0.9999
jump_temp_scale = 50.0
jump_temp_coef = 20.0
stop_condition_improvement_threshold = 0.99
stop_condition_successes_threshold = 50
stop_condition_steps = 50000
