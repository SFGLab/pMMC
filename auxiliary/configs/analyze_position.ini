; ============================================================================
; pMMC-analyze — Extract 3D positions for genomic regions
; ============================================================================
;
; Usage:  pMMC-analyze -s analyze_position.ini
;
; Given an HCM structure and a BED file of genomic regions, extracts the
; interpolated 3D position (x y z) for the midpoint of each region.
;
; Output:  one line per region with "x y z" coordinates.
; If add_header = yes, the first line is the number of regions.
;
; ============================================================================

[main]
action = position
output_dir = ./positions.txt                 ; Output file path
bed_regions_file = ./my_regions.bed          ; BED file: chr  start  end
add_header = yes                             ; Write region count as first line
seed = 42

[data]
input_file = ./output/loops_gm12878_ctcf.hcm
