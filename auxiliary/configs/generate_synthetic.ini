; ============================================================================
; pMMC-generate — Generate synthetic ChIA-PET data
; ============================================================================
;
; Usage:  pMMC-generate -s generate_synthetic.ini
;
; Creates synthetic ground-truth polymer structures and corresponding
; ChIA-PET-like data (anchors, clusters, singletons) for benchmarking.
;
; Output files (in output_dir):
;   settings.ini                 — auto-generated settings for reconstruction
;   anchors.txt                  — synthetic anchor positions (BED format)
;   clusters.txt                 — synthetic loop interactions (BEDPE format)
;   singletons.txt               — synthetic singleton interactions
;   segments.bed                 — segment boundaries
;   centromeres.bed              — centromere regions
;   ground_truth.txt             — ground-truth 3D coordinates
;
; The generated settings.ini can be directly passed to pMMC-reconstruct:
;   pMMC-reconstruct -s ./synthetic_data/settings.ini
;
; ============================================================================

[main]
output_dir = ./synthetic_data/
chromosomes = chr22             ; Chromosome name for the synthetic data
label = synthetic               ; Label prefix for output files
num_loops = 100                 ; Number of chromatin loops to generate
ensemble_size = 20              ; Number of polymer conformations in the ensemble
resolution = 25000              ; Resolution in bp per bead
seed = 42                       ; Random seed (0 = time-based)
