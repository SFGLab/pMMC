; ============================================================================
; pMMC-analyze — Ensemble analysis (structural variability)
; ============================================================================
;
; Usage:  pMMC-analyze -s analyze_ensemble.ini
;
; Reads a set of HCM structures matching a file pattern, computes pairwise
; Spearman correlations and structural distances at multiple hierarchy levels.
;
; The pattern must contain {N} which is replaced with 0, 1, 2, ... until
; no more files are found.
;
; Output files:
;   <label>_distances_lvl0.heat          — pairwise structural distances (chromosome level)
;   <label>_distances_lvl1.heat          — pairwise structural distances (segment level)
;   <label>_distances_lvl2.heat          — pairwise structural distances (subanchor level)
;   <label>_spearman_correlations.csv    — all pairwise Spearman values
;   <label>_correlation_matrix.csv       — NxN correlation matrix
;   <label>_correlation_heatmap.svg      — heatmap visualization
;   <label>_correlation_histogram.svg    — distribution of correlations
;   <label>_ensemble_summary.txt         — mean, median, std, min, max
;
; ============================================================================

[main]
action = ensemble
output_dir = ./ensemble_analysis/
label = ens_chr14
pattern = loops_ensemble_chr14_{N}.hcm       ; File pattern with {N} placeholder
seed = 42

[data]
input_file = ./ensemble_output/              ; Directory containing the HCM files
