; ============================================================================
; pMMC-convert — Merge BED + BEDPE into a single merged file
; ============================================================================
;
; Usage:  pMMC-convert -s convert_merge.ini
;
; Combines a BED file (anchor positions) and a BEDPE file (pairwise
; interactions) into pMMC's merged format for use with input_format=merged.
;
; ============================================================================

[main]
action = merge
output_dir = ./merged_output.merged          ; Output merged file path

[data]
bed_file = ./my_anchors.bed                  ; BED: chr  start  end
bedpe_file = ./my_interactions.bedpe         ; BEDPE: chr1 start1 end1 chr2 start2 end2 score
