; ============================================================================
; pMMC-analyze — Generate distance and contact maps from a structure
; ============================================================================
;
; Usage:  pMMC-analyze -s analyze_distmap.ini
;
; Reads an HCM file, computes pairwise distance and contact frequency maps,
; and writes heatmap files + SVG/PNG images.
;
; Output files:
;   <label>_distmap.heat / .svg / .png     — pairwise 3D distance map
;   <label>_contactmap.heat / .svg / .png  — binary contact map
;   <label>_freqmap.heat / .svg / .png     — contact frequency map
;   <label>_contact_decay.csv              — contact probability vs genomic distance
;
; ============================================================================

[main]
action = distmap
output_dir = ./analysis_output/
label = chr14_maps
chromosomes = chr14             ; Chromosome to analyze
level = 2                       ; Hierarchy level: 0=chr, 1=segment, 2=subanchor, 3=bead
resolution = 25000              ; Resolution in bp for equidistant model (0 = use raw beads)
seed = 42

[data]
input_file = ./output/loops_gm12878_ctcf.hcm  ; Input HCM structure file
