; ============================================================================
; pMMC-reconstruct — 3D genome reconstruction from ChIA-PET data
; ============================================================================
;
; Usage:  pMMC-reconstruct -s reconstruct_chiapet.ini
;
; This example reconstructs chr14 from GM12878 CTCF ChIA-PET data.
; All paths below assume the pMMC datasets directory is at ../datasets/.
; Adjust data_dir, segment_split, and centromeres to match your setup.
;
; ============================================================================

[main]
; --- Run configuration ---
chromosomes = chr14             ; Which chromosomes to reconstruct
                                ;   Single:   chr14
                                ;   Range:    chr1-chr5
                                ;   List:     chr14,chr21,chrX
                                ;   Subregion: chr14:20000000:30000000
                                ;   All:      genome
output_dir = ./output/          ; Output directory (created if missing)
label = gm12878_ctcf            ; Prefix for all output filenames
seed = 42                       ; Random seed (0 = time-based, non-zero = reproducible)
ensemble_size = 1               ; Number of structures in the ensemble (1 = single structure)
output_format = pdb             ; Additional output: pdb, cif, both, or empty (HCM always written)
max_level = 5                   ; Maximum hierarchy level to reconstruct (5 = full resolution)
output_level = 2                ; Verbosity: 0=silent, 1=minimal, 2=normal, 3=debug

; --- Polymer model ---
random_walk = no                ; Use random walk instead of Monte Carlo simulated annealing
loop_density = 5                ; Maximum beads per loop anchor region
use_2D = no                     ; Project structure to 2D (for testing/visualization only)

; --- Limits (uncomment to enable) ---
;length_limit = 50000000        ; Reconstruct at most this many bp per chromosome (-1 = no limit)
;chr_number_limit = 5           ; Reconstruct at most this many chromosomes (-1 = no limit)
;max_memory_mb = 8000           ; RAM budget in MB; program exits gracefully if exceeded (0 = unlimited)

; --- Annotation (uncomment to enable gene-level coloring in PDB/CIF) ---
;annotation_dir = ./annotations/  ; Directory containing enhancer.bed, promoter.bed, epigenetic.bed

; --- SA restarts per level ---
steps_lvl1 = 2                  ; Restarts at level 1 (segment heatmap)
steps_lvl2 = 2                  ; Restarts at level 2 (anchor heatmap)
steps_arcs = 3                  ; Restarts at level 3 (arc/loop fitting)
steps_smooth = 3                ; Restarts at level 4 (smoothing pass)

; --- Displacement noise per level ---
noise_lvl1 = 0.5               ; Perturbation magnitude for segment heatmap
noise_lvl2 = 0.5               ; Perturbation magnitude for anchor heatmap
noise_arcs = 0.01              ; Perturbation magnitude for arc fitting
noise_smooth = 5.0             ; Perturbation magnitude for smoothing

; --- PET cluster filtering ---
max_pet_length = 1000000        ; Ignore PET clusters spanning more than this many bp
long_pet_power = 2.0            ; Exponent for distance penalty on long PET clusters
long_pet_scale = 1.0            ; Multiplier for long PET cluster penalty

; ============================================================================
[cuda]
; ============================================================================
num_threads = 512               ; CUDA threads per block (128, 256, or 512)
blocks_multiplier = 4           ; GPU blocks = atoms * this multiplier (higher = more parallelism)
milestone_fails = 3             ; Consecutive SA milestone failures before stopping a run

; ============================================================================
[data]
; ============================================================================
; ChIA-PET input (default format)
data_dir = ../datasets/chiapet_ctcf_gm12878/supplementary/
anchors = anchors_ctcf_3col.bed              ; BED: chr start end [orientation]
clusters = clusters_ctcf.bedpe               ; BEDPE: high-confidence loop interactions
factors = CTCF                               ; Protein factor name(s), comma-separated
singletons = singletons_ctcf.bedpe           ; BEDPE: low-count background interactions
split_singleton_files_by_chr = no            ; Split singletons by chromosome (saves memory for large datasets)
singletons_inter =                           ; BEDPE: inter-chromosomal singletons (leave empty if none)
segment_split = ../datasets/chiapet_ctcf_gm12878/supplementary/segments_ctcf_allchr.bed
centromeres =                                ; BED: centromere/gap regions to exclude (leave empty if none)

; --- Alternative input formats (uncomment ONE block) ---
;
; Merged format (single file with anchors + interactions):
;   input_format = merged
;   input_file = ./my_data.merged
;
; iBED format:
;   input_format = ibed
;   input_file = ./my_data.ibed
;
; Contact matrix format (Hi-C):
;   input_format = contact
;   input_file = ./my_contact_matrix.txt
;   contact_resolution = 5000
;
; Batch mode (one line per cell line: name data_dir settings_file):
;   cell_line_list = ./cell_lines.txt

; ============================================================================
[distance]
; ============================================================================
; Genomic distance to 3D distance:  d3D = scale * genomic_dist^power + base
genomic_dist_power = 0.75
genomic_dist_scale = 0.5
genomic_dist_base = 1.0

; Singleton frequency to 3D distance (segment level):  d = scale * freq^power
freq_dist_scale = 25.0
freq_dist_power = -0.6

; Inter-chromosomal singleton frequency to 3D distance
freq_dist_scale_inter = 120.0
freq_dist_power_inter = -1.0

; PET cluster count to 3D distance:  d = a * (count + shift)^(-scale) + base_level
count_dist_a = 0.2
count_dist_scale = 1.8
count_dist_shift = 8
count_dist_base_level = 0.2

; ============================================================================
[template]
; ============================================================================
;template_segment = ./template_chr14.txt     ; Optional: pre-computed segment template structure
template_scale = 7.0                         ; Scale factor for template distances
;dist_heatmap = ./dist_heatmap.heat          ; Optional: pre-computed distance heatmap
dist_heatmap_scale = 15.0                    ; Scale factor for distance heatmap

; ============================================================================
[motif_orientation]
; ============================================================================
use_motif_orientation = no      ; Use CTCF convergent/divergent motif orientation as energy term
weight = 50.0                   ; Energy penalty weight for incorrect orientation

; ============================================================================
[anchor_heatmap]
; ============================================================================
use_anchor_heatmap = no         ; Use singleton heatmap at anchor level
heatmap_influence = 0.5         ; Weight of anchor heatmap in energy function

; ============================================================================
[subanchor_heatmap]
; ============================================================================
use_subanchor_heatmap = no      ; Use singleton heatmap at subanchor level
estimate_distances_steps = 4    ; MC steps for distance estimation
estimate_distances_replicates = 4
heatmap_influence = 0.1
heatmap_dist_weight = 0.01

; ============================================================================
[heatmaps]
; ============================================================================
inter_scaling = 1.0             ; Scale factor for inter-segment heatmap values
distance_heatmap_stretching = 2.5

; ============================================================================
[springs]
; ============================================================================
stretch_constant = 0.1          ; Penalty for stretching linker bonds
squeeze_constant = 0.1          ; Penalty for compressing linker bonds
angular_constant = 0.1          ; Penalty for bending angles
stretch_constant_arcs = 1.0     ; Stretch penalty during arc fitting
squeeze_constant_arcs = 1.0     ; Squeeze penalty during arc fitting

; ============================================================================
[simulation]
; ============================================================================
sphere_radius = 0.0             ; Spherical confinement radius (0 = disabled)

; ============================================================================
[simulation_heatmap]
; ============================================================================
max_temp_heatmap = 5.0
delta_temp_heatmap = 0.9999
jump_temp_scale_heatmap = 50.0
jump_temp_coef_heatmap = 20.0
stop_condition_improvement_threshold_heatmap = 0.99
stop_condition_successes_threshold_heatmap = 10
stop_condition_steps_heatmap = 50000

; ============================================================================
[simulation_arcs]
; ============================================================================
max_temp = 5.0
delta_temp = 0.9999
jump_temp_scale = 50.0
jump_temp_coef = 20.0
stop_condition_improvement_threshold = 0.975
stop_condition_successes_threshold = 100
stop_condition_steps = 50000

; ============================================================================
[simulation_arcs_smooth]
; ============================================================================
dist_weight = 1.0
angle_weight = 1.0
max_temp = 5.0
delta_temp = 0.9999
jump_temp_scale = 50.0
jump_temp_coef = 20.0
stop_condition_improvement_threshold = 0.99
stop_condition_successes_threshold = 50
stop_condition_steps = 50000
