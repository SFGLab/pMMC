; ============================================================================
; pMMC-analyze — Rewiring analysis (contact heatmaps from ensemble)
; ============================================================================
;
; Usage:  pMMC-analyze -s analyze_rewiring.ini
;
; For each structure matching the file pattern, creates equidistant models
; and computes inverse-distance heatmaps per chromosome.  Useful for
; comparing structural reorganization across ensemble members.
;
; The pattern must contain {N} which is replaced with 0, 1, 2, ...
;
; ============================================================================

[main]
action = rewiring
output_dir = ./rewiring_output/
pattern = loops_ensemble_{N}.hcm             ; File pattern with {N}
level = 1                                    ; Hierarchy level for equidistant model
resolution = 1000000                         ; Resolution in bp
seed = 42

[data]
input_file = ./ensemble_output/              ; Directory containing the HCM files
