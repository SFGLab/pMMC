; ============================================================================
; pMMC-convert — Create smoothed equidistant model
; ============================================================================
;
; Usage:  pMMC-convert -s convert_smooth.ini
;
; Creates an equidistant (uniformly spaced) model from a hierarchical
; structure at the given resolution.  Useful for producing coordinates
; at a fixed bp-per-bead spacing for downstream analysis.
;
; ============================================================================

[main]
action = smooth
output_dir = ./smoothed_chr14.txt            ; Output text file path
chromosomes = chr14
level = 2                                    ; Hierarchy level to smooth from
resolution = 50000                           ; Resolution in bp per bead

[data]
input_file = ./output/loops_gm12878_ctcf.hcm
