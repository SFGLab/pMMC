; ============================================================================
; pMMC-analyze — Compare two structures (quality metrics)
; ============================================================================
;
; Usage:  pMMC-analyze -s analyze_metrics.ini
;
; Compares two HCM structures and reports:
;   - Stratum-adjusted Correlation Coefficient (SCC)
;   - Per-diagonal Pearson correlations
;   - RMSD after Procrustes alignment
;   - Full metrics log
;
; Output files:
;   <label>_metrics.log          — full metrics report
;   <label>_diagonal_corr.csv   — per-diagonal correlation values
;
; ============================================================================

[main]
action = metrics
output_dir = ./comparison_output/
label = pmmc_vs_cuda
chromosomes = chr14             ; Chromosome to compare
level = 2                       ; Hierarchy level for comparison
resolution = 25000              ; Resolution in bp
seed = 42

; The first structure:
input_file_2 = ./output_cuda/loops_cuda_chr14.hcm   ; Second structure to compare against

[data]
input_file = ./output_pmmc/loops_pmmc_chr14.hcm      ; First structure
