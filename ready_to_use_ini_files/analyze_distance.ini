; ============================================================================
; pMMC-analyze — Compute structural distance matrix
; ============================================================================
;
; Usage:  pMMC-analyze -s analyze_distance.ini
;
; Computes the NxN pairwise 3D distance matrix between all beads at the
; specified hierarchy level and writes it as a .heat file.
;
; ============================================================================

[main]
action = distance
output_dir = ./chr14_distances.heat          ; Output file path
chromosomes = chr14
level = 1                                    ; 0=chr, 1=segment, 2=subanchor
seed = 42

[data]
input_file = ./output/loops_gm12878_ctcf.hcm
