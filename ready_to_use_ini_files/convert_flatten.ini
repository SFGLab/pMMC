; ============================================================================
; pMMC-convert — Flatten hierarchical structure to text coordinates
; ============================================================================
;
; Usage:  pMMC-convert -s convert_flatten.ini
;
; Extracts bead coordinates at the specified hierarchy level and writes
; them as a plain text file (one "x y z" per line).
;
; ============================================================================

[main]
action = flatten
output_dir = ./flattened_chr14.txt           ; Output text file path
chromosomes = chr14                          ; Chromosome to flatten (empty = all)
level = 2                                    ; 0=chr, 1=segment, 2=subanchor, 3=bead

[data]
input_file = ./output/loops_gm12878_ctcf.hcm
