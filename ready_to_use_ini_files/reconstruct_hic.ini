; ============================================================================
; pMMC-reconstruct — 3D genome reconstruction from Hi-C contact matrix
; ============================================================================
;
; Usage:  pMMC-reconstruct -s reconstruct_hic.ini
;
; This example reconstructs chr14 from a Hi-C contact matrix.
; Provide a whitespace-delimited NxN contact matrix (no header row).
;
; ============================================================================

[main]
chromosomes = chr14
output_dir = ./output_hic/
label = hic_chr14
seed = 42
ensemble_size = 1
output_format = pdb
max_level = 5
output_level = 2
random_walk = no
loop_density = 5

steps_lvl1 = 2
steps_lvl2 = 2
steps_arcs = 3
steps_smooth = 3
noise_lvl1 = 0.5
noise_lvl2 = 0.5
noise_arcs = 0.01
noise_smooth = 5.0
max_pet_length = 1000000
long_pet_power = 2.0
long_pet_scale = 1.0

[cuda]
num_threads = 512
blocks_multiplier = 4
milestone_fails = 3

[data]
; Hi-C contact matrix input
input_format = contact
input_file = ./my_hic_contact_matrix.txt     ; NxN whitespace-delimited contact matrix
contact_resolution = 5000                     ; Resolution in bp per bin

; These fields are unused for contact format but must be present:
data_dir = ./
anchors =
clusters =
factors =
singletons =
singletons_inter =
segment_split =
centromeres =

[distance]
genomic_dist_power = 0.75
genomic_dist_scale = 0.5
genomic_dist_base = 1.0
freq_dist_scale = 25.0
freq_dist_power = -0.6
freq_dist_scale_inter = 120.0
freq_dist_power_inter = -1.0
count_dist_a = 0.2
count_dist_scale = 1.8
count_dist_shift = 8
count_dist_base_level = 0.2

[template]
template_scale = 7.0
dist_heatmap_scale = 15.0

[motif_orientation]
use_motif_orientation = no
weight = 50.0

[springs]
stretch_constant = 0.1
squeeze_constant = 0.1
angular_constant = 0.1
stretch_constant_arcs = 1.0
squeeze_constant_arcs = 1.0

[simulation_heatmap]
max_temp_heatmap = 5.0
delta_temp_heatmap = 0.9999
jump_temp_scale_heatmap = 50.0
jump_temp_coef_heatmap = 20.0
stop_condition_improvement_threshold_heatmap = 0.99
stop_condition_successes_threshold_heatmap = 10
stop_condition_steps_heatmap = 50000

[simulation_arcs]
max_temp = 5.0
delta_temp = 0.9999
jump_temp_scale = 50.0
jump_temp_coef = 20.0
stop_condition_improvement_threshold = 0.975
stop_condition_successes_threshold = 100
stop_condition_steps = 50000

[simulation_arcs_smooth]
dist_weight = 1.0
angle_weight = 1.0
max_temp = 5.0
delta_temp = 0.9999
jump_temp_scale = 50.0
jump_temp_coef = 20.0
stop_condition_improvement_threshold = 0.99
stop_condition_successes_threshold = 50
stop_condition_steps = 50000
