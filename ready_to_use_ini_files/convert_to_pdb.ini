; ============================================================================
; pMMC-convert — Convert HCM to PDB/CIF format
; ============================================================================
;
; Usage:  pMMC-convert -s convert_to_pdb.ini
;
; Converts an HCM hierarchical structure file to PDB and/or mmCIF format
; for visualization in PyMOL, ChimeraX, or other molecular viewers.
;
; Output files:
;   <basename>.pdb   — PDB coordinate file
;   <basename>.cif   — mmCIF coordinate file (if format = cif or both)
;
; ============================================================================

[main]
action = convert
output_dir = ./converted/                    ; Output directory
output_format = both                         ; pdb, cif, or both

[data]
input_file = ./output/loops_gm12878_ctcf.hcm
