; ============================================================================
; pMMC-convert — Extract a genomic fragment from an HCM structure
; ============================================================================
;
; Usage:  pMMC-convert -s convert_extract.ini
;
; Extracts a subregion of the hierarchical structure and optionally converts
; it to PDB/CIF.  Useful for focusing on a specific locus.
;
; Specify the region either as:
;   chromosomes = chr14:20000000:30000000   (preferred)
; or:
;   extract_start = 20000000
;   extract_end   = 30000000
;
; ============================================================================

[main]
action = extract
output_dir = ./extracted_fragment.hcm        ; Output HCM file path
output_format = pdb                          ; Also produce PDB (pdb, cif, both, or empty)
chromosomes = chr14:20000000:30000000        ; Region to extract

[data]
input_file = ./output/loops_gm12878_ctcf.hcm
