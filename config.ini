[main]
output_level = 2                ; Verbosity: 0=silent, 1=minimal, 2=normal, 3=debug
random_walk = no                ; Use random walk instead of MC simulated annealing
loop_density = 5                ; Max beads per loop anchor region

; Memory budget in MB (0 = unlimited). Program exits gracefully if exceeded.
max_memory_mb = 0               ; RAM limit in MB (0=unlimited)

use_2D = no                     ; Project structure to 2D (for testing/visualization)

max_pet_length = 1000000        ; Ignore PET clusters spanning more than this many bp
long_pet_power = 2.0            ; Exponent for distance penalty on long PET clusters
long_pet_scale = 1.0            ; Multiplier for long PET cluster penalty

steps_lvl1 = 1                  ; SA restarts at level 1 (chromosome/segment heatmap)
steps_lvl2 = 1                  ; SA restarts at level 2 (anchor heatmap)
steps_arcs = 1                  ; SA restarts at level 3 (arc/loop constraint fitting)
steps_smooth = 1                ; SA restarts at level 4 (smoothing pass)

noise_lvl1 = 0.5                ; Random perturbation magnitude for level 1
noise_lvl2 = 0.5                ; Random perturbation magnitude for level 2
noise_arcs = 0.01               ; Random perturbation magnitude for arc fitting
noise_smooth = 5.0              ; Random perturbation magnitude for smoothing

[cuda]
num_threads = 512               ; CUDA threads per block
blocks_multiplier = 16          ; GPU blocks = atoms * this multiplier
milestone_fails = 3             ; Consecutive SA milestone failures before stopping

[data]
data_dir = ../data_GM12878/                        ; Path to input data directory
anchors = GM12878_anchors.bed                      ; BED file: loop anchor positions (chr start end)
clusters = GM12878_clusters.bedpe                  ; BEDPE file: high-confidence loop interactions
factors = CTCF                                     ; Protein factor name(s) for loop clusters
singletons = GM12878_singletons.bedpe              ; BEDPE file: low-count background interactions
split_singleton_files_by_chr = no                  ; Split singleton files by chromosome for memory
singletons_inter = mock.txt                        ; BEDPE file: inter-chromosomal singletons
segment_split = ../data_GM12878/GM12878_segments.bed ; BED file: TAD/segment boundaries
centromeres = ../data_GM12878/hg38.bed             ; BED file: centromere/gap regions to avoid

[distance]
genomic_dist_power = 0.75       ; Exponent: genomic distance → 3D distance (d^power)
genomic_dist_scale = 0.5        ; Multiplier: genomic distance → 3D distance
genomic_dist_base = 1.0         ; Additive base for genomic distance mapping

; Singletons interaction frequency → 3D distance (segment level)
freq_dist_scale = 25.0          ; Multiplier: singleton freq → segment-level 3D distance
freq_dist_power = -0.6          ; Exponent: singleton freq → segment-level 3D distance

; Interchromosomal singletons interaction frequency → 3D distance (chromosome level)
freq_dist_scale_inter = 120.0   ; Multiplier: inter-chr singleton freq → 3D distance
freq_dist_power_inter = -1.0    ; Exponent: inter-chr singleton freq → 3D distance

count_dist_a = 0.2              ; Coefficient 'a' in cluster count → distance mapping
count_dist_scale = 1.8          ; Scale factor for cluster count → distance
count_dist_shift = 8            ; Offset shift for cluster count → distance
count_dist_base_level = 0.2     ; Base distance level for cluster count mapping

[template]
;template_segment = ...         ; Optional: pre-computed segment template structure
template_scale = 7.0            ; Scale factor for template segment distances
;dist_heatmap = ...             ; Optional: pre-computed distance heatmap
dist_heatmap_scale = 15.0       ; Scale factor for template distance heatmap

[motif_orientation]
use_motif_orientation = no      ; Use CTCF motif convergent/divergent orientation
weight = 50.0                   ; Energy penalty weight for incorrect motif orientation

[anchor_heatmap]
use_anchor_heatmap = no         ; Use pre-computed anchor-level contact heatmap
heatmap_influence = 0.5         ; Weight of anchor heatmap in energy function

[subanchor_heatmap]
use_subanchor_heatmap = no      ; Use pre-computed subanchor-level contact heatmap
estimate_distances_steps = 4    ; MC steps to estimate pairwise distances
estimate_distances_replicates = 4 ; Replicate runs for distance estimation
heatmap_influence = 0.1         ; Weight of subanchor heatmap in energy function
heatmap_dist_weight = 0.01      ; Weight of distance component in subanchor heatmap

[heatmaps]
inter_scaling = 1.0             ; Scale factor for inter-segment heatmap values
distance_heatmap_stretching = 2.5 ; Stretch factor for distance-based heatmap

[springs]
stretch_constant = 0.1          ; Spring constant: penalty for stretching bonds
squeeze_constant = 0.1          ; Spring constant: penalty for compressing bonds
angular_constant = 0.1          ; Spring constant: penalty for bending angles

stretch_constant_arcs = 1.0     ; Spring stretch constant during arc fitting phase
squeeze_constant_arcs = 1.0     ; Spring squeeze constant during arc fitting phase

[simulation_heatmap]
max_temp_heatmap = 5.0          ; SA starting temperature for heatmap phase
delta_temp_heatmap = 0.9999     ; SA cooling rate (temp *= delta each step)
jump_temp_scale_heatmap = 50.0  ; SA reheating scale on milestone improvement
jump_temp_coef_heatmap = 20.0   ; SA reheating coefficient on milestone improvement
stop_condition_improvement_threshold_heatmap = 0.99 ; Stop if improvement ratio < this
stop_condition_successes_threshold_heatmap = 10     ; Consecutive non-improvements to stop
stop_condition_steps_heatmap = 50000                ; Max MC steps per heatmap SA run

[simulation_arcs]
max_temp = 5.0                  ; SA starting temperature for arc fitting phase
jump_temp_scale = 50.0          ; SA reheating scale on milestone improvement
jump_temp_coef = 20.0           ; SA reheating coefficient on milestone improvement
delta_temp = 0.9999             ; SA cooling rate for arc fitting
stop_condition_improvement_threshold = 0.975 ; Stop if improvement ratio < this
stop_condition_successes_threshold = 100     ; Consecutive non-improvements to stop
stop_condition_steps = 50000                 ; Max MC steps per arc SA run

[simulation_arcs_smooth]
dist_weight = 1.0               ; Weight of distance term in smoothing energy
angle_weight = 1.0              ; Weight of angle term in smoothing energy
max_temp = 5.0                  ; SA starting temperature for smoothing phase
jump_temp_scale = 50.0          ; SA reheating scale on milestone improvement
jump_temp_coef = 20.0           ; SA reheating coefficient on milestone improvement
delta_temp = 0.9999             ; SA cooling rate for smoothing
stop_condition_improvement_threshold = 0.99 ; Stop if improvement ratio < this
stop_condition_successes_threshold = 50     ; Consecutive non-improvements to stop
stop_condition_steps = 50000               ; Max MC steps per smoothing SA run
